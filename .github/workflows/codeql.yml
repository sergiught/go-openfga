name: codeql

# Static security analysis via GitHub Security Lab's curated Go query suite.
# Runs on every push to main, every PR targeting main, and a weekly Monday
# cron so new query rules picked up between PRs still surface.
#
# Findings appear in the repo's Security tab → "Code scanning alerts".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read            # codeql needs to read workflow run data
      contents: read
      security-events: write   # upload code-scanning results
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true

      # github/codeql-action v3 — bump via Renovate / Dependabot when a new
      # query release ships.
      - name: initialize codeql
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57
        with:
          languages: go
          queries: security-and-quality

      - name: autobuild
        uses: github/codeql-action/autobuild@03e4368ac7daa2bd82b3e85262f3bf87ee112f57

      - name: analyze
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57
        with:
          category: '/language:go'
