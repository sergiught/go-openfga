name: codeql

# Static security analysis via GitHub Security Lab's curated Go query suite.
# Runs on every push to main, every PR targeting main, and a weekly Monday
# cron so new query rules picked up between PRs still surface.
#
# Findings appear in the repo's Security tab → "Code scanning alerts".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read            # codeql needs to read workflow run data
      contents: read
      security-events: write   # upload code-scanning results
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true

      - name: initialize codeql
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: go
          build-mode: manual
          queries: security-and-quality

      # autobuild only compiles the root module. Each nested module carries its
      # own go.mod, so build all three explicitly to give CodeQL a complete
      # extraction across root, dsl and test/integration.
      - name: build modules
        shell: bash
        run: |
          for mod in . dsl test/integration; do
            (cd "$mod" && go build ./...)
          done

      - name: analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: '/language:go'
