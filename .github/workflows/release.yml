name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # On every push to main, release-please either opens/updates a "Release PR"
  # (collecting all conventional commits since the last tag) or — if the push
  # IS the merged Release PR — cuts the tag and creates the GitHub release with
  # the generated CHANGELOG as the body.
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create tags/releases
      pull-requests: write   # open/update the Release PR
    steps:
      # googleapis/release-please-action v4.1.3
      #
      # Uses RELEASE_PLEASE_TOKEN (a fine-grained PAT with Contents +
      # Pull-requests write) rather than the default GITHUB_TOKEN. GitHub
      # silently skips push / pull_request workflows for events triggered by
      # GITHUB_TOKEN (recursion guard), which would leave the Release PR
      # without CI checks. A PAT makes the PR look like it came from a real
      # user, so ci.yml fires normally.
      - uses: googleapis/release-please-action@cc61a07e2da466bebbc19b3a7dd01d6aecb20d1e
        with:
          token:         ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
