# Codecov configuration.
#
# Coverage is uploaded from ci.yml under the `unit` flag. The integration
# suite lives in its own module (test/integration) and is exercised by the
# `integration` CI job, not measured for line coverage here. Keep the status
# checks informational rather than blocking while the library is pre-1.0.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
