name: dependency-review

# Scans dependency manifest changes on a PR and fails if it introduces a
# dependency with a known vulnerability or a disallowed license. Complements
# the govulncheck job (which scans the resolved graph) by gating the diff
# before it lands. Findings surface in the PR's Checks tab.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
